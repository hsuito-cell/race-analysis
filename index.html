<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>動画解析アプリ</title>
    <style>
      :root {
        --bg: #111;
        --panel: #1c1c1e;
        --b1: #2c2c2e;
        --b2: #3a3a3c;
        --accent: #4a9eff;
        --green: #30d158;
        --red: #ff453a;
        --orange: #ff9f0a;
        --tx: #e5e5ea;
        --tx2: #8e8e93;
        --font: "Courier New", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--tx);
        font-family: var(--font);
        font-size: 15px; /* 13px → 15px */
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }

      /* ── レイアウト ─────────────────────────────── */
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
      }

      /* ── ヘッダー ─────────────────────────────────*/
      #hdr {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: var(--panel);
        border-bottom: 1px solid var(--b1);
        flex-shrink: 0;
      }
      #hdr-title {
        flex: 1;
        text-align: center;
        font-size: 0.85rem;
        color: var(--tx2);
        letter-spacing: 0.08em;
      }
      #filename {
        font-size: 0.75rem;
        color: var(--tx2);
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── 動画エリア ───────────────────────────────*/
      #video-wrap {
        flex: 1;
        position: relative;
        background: #000;
        overflow: hidden;
        min-height: 0;
      }
      #main-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
      #mag-wrap {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 130px;
        height: 130px;
        border: 2px solid #ff4444;
        background: #000;
        pointer-events: none;
        z-index: 10;
      }
      #mag-canvas {
        width: 100%;
        height: 100%;
      }
      /* 設定中オーバーレイ */
      #mode-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(255, 159, 10, 0.9);
        color: #000;
        padding: 4px 12px;
        border-radius: 8px;
        font-size: 0.78rem;
        display: none;
        pointer-events: none;
        z-index: 5;
      }

      /* モード切り替えボタン */
      #btn-mode-toggle {
        font-weight: bold;
        min-width: 80px;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
      }
      #btn-mode-toggle.mode-auto {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      #btn-mode-toggle.mode-manual {
        background: var(--orange);
        color: #000;
        border-color: var(--orange);
      }

      /* 2点間速度 大表示オーバーレイ（左上・ドラッグ可） */
      #vel-overlay {
        display: none;
        position: absolute;
        top: 8px;
        left: 8px;
        transform: none;
        background: rgba(0, 0, 0, 0.88);
        border: 2px solid var(--accent);
        border-radius: 12px;
        padding: 0;
        z-index: 20;
        text-align: center;
        min-width: 230px;
        user-select: none;
        -webkit-user-select: none;
        cursor: move;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }
      /* ドラッグハンドル（タイトルバー） */
      #vel-overlay .vo-title {
        font-size: 0.8rem;
        color: var(--tx2);
        padding: 8px 14px 7px;
        border-bottom: 1px solid var(--b2);
        letter-spacing: 0.06em;
        cursor: move;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 10px 10px 0 0;
      }
      #vel-overlay .vo-body {
        padding: 14px 24px 12px;
      }
      #vel-overlay .vo-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 14px;
        margin-bottom: 6px;
      }
      #vel-overlay .vo-lbl {
        font-size: 0.82rem;
        color: var(--tx2);
      }
      #vel-overlay .vo-val {
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
      }
      #vel-overlay .vo-spd {
        font-size: 2.3rem;
        font-weight: bold;
        color: #fff;
        margin: 8px 0 4px;
        font-variant-numeric: tabular-nums;
      }
      #vel-overlay .vo-unit {
        font-size: 0.78rem;
        color: var(--tx2);
      }
      #vel-overlay .vo-dt {
        font-size: 0.72rem;
        color: var(--tx2);
        margin-bottom: 10px;
      }
      #vel-close {
        width: 100%;
        margin-top: 4px;
        border-radius: 0 0 8px 8px;
        border-top: 1px solid var(--b2);
        padding: 7px;
        font-size: 0.75rem;
        background: transparent;
        border-left: none;
        border-right: none;
        border-bottom: none;
      }

      /* ── 情報バー ─────────────────────────────────*/
      #info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 10px;
        background: var(--panel);
        border-top: 1px solid var(--b1);
        border-bottom: 1px solid var(--b1);
        flex-shrink: 0;
        min-height: 26px;
      }
      #info-bar span {
        font-size: 0.75rem;
        color: var(--accent);
        letter-spacing: 0.02em;
      }

      /* ── コントロール ─────────────────────────────*/
      #ctrl {
        flex-shrink: 0;
        background: var(--panel);
        padding: 7px 10px;
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .ctrl-row:last-child {
        margin-bottom: 0;
      }
      input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
        height: 5px;
      }
      input[type="number"] {
        width: 66px;
        background: var(--b1);
        border: 1px solid var(--b2);
        color: var(--tx);
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 0.8rem;
        font-family: var(--font);
      }
      button {
        background: var(--b1);
        color: var(--tx);
        border: 1px solid var(--b2);
        border-radius: 5px;
        padding: 6px 10px;
        font-size: 0.8rem;
        cursor: pointer;
        font-family: var(--font);
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        opacity: 0.6;
      }
      button.accent {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      button.green {
        background: var(--green);
        color: #fff;
        border-color: var(--green);
      }
      button.red {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }
      button:disabled {
        opacity: 0.35;
        pointer-events: none;
      }
      .info-lbl {
        font-size: 0.74rem;
        color: var(--tx2);
        white-space: nowrap;
      }

      /* ── 設定モーダル ─────────────────────────────*/
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 100;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-end;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal-sheet {
        background: var(--panel);
        border-top: 1px solid var(--b2);
        border-radius: 14px 14px 0 0;
        padding: 14px;
        max-height: 80vh;
        max-height: 80dvh;
        overflow-y: auto;
      }
      .modal-title {
        font-size: 0.92rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 12px;
        color: var(--tx);
      }
      .setting-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .setting-lbl {
        font-size: 0.8rem;
        color: var(--tx2);
        min-width: 96px;
      }
      .setting-row input[type="range"] {
        flex: 1;
        accent-color: var(--accent);
      }
      .setting-row select {
        flex: 1;
        background: var(--b1);
        border: 1px solid var(--b2);
        color: var(--tx);
        border-radius: 4px;
        padding: 5px;
        font-size: 0.8rem;
      }
      .setting-row input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }
      .modal-btns {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .modal-btns button {
        flex: 1;
        min-width: 100px;
      }

      /* ── グラフモーダル ───────────────────────────*/
      #graph-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 200;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #graph-overlay.open {
        display: flex;
      }
      #graph-sheet {
        background: var(--panel);
        border: 1px solid var(--b2);
        border-radius: 12px;
        padding: 10px;
        width: min(600px, 96vw);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #graph-tabs {
        display: flex;
        gap: 6px;
      }
      #graph-tabs button {
        flex: 1;
      }
      #graph-canvas {
        width: 100%;
        border-radius: 6px;
        background: #111;
      }

      /* ── ステップバー ─────────────────────────────*/
      #step-bar {
        display: flex;
        align-items: center;
        padding: 5px 10px;
        background: var(--panel);
        border-bottom: 1px solid var(--b1);
        gap: 3px;
        flex-shrink: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #step-bar::-webkit-scrollbar {
        display: none;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 4px 9px;
        border-radius: 10px;
        background: var(--b1);
        white-space: nowrap;
        border: 1px solid transparent;
        font-size: 0.72rem;
        transition:
          background 0.25s,
          border-color 0.25s,
          color 0.25s;
        flex-shrink: 0;
      }
      .step.done {
        background: rgba(48, 209, 88, 0.1);
        border-color: var(--green);
        color: var(--green);
      }
      .step.current {
        background: rgba(255, 159, 10, 0.15);
        border-color: var(--orange);
        color: var(--orange);
        font-weight: bold;
      }
      .step .sn {
        font-weight: bold;
      }
      .step-arr {
        color: var(--b2);
        font-size: 0.7rem;
        flex-shrink: 0;
      }
      /* ステップタップ時のフィードバック */
      .step:hover {
        opacity: 0.8;
        transform: scale(1.04);
      }
      .step:active {
        opacity: 0.6;
        transform: scale(0.97);
      }
      .step {
        transition:
          background 0.25s,
          border-color 0.25s,
          color 0.25s,
          opacity 0.1s,
          transform 0.1s;
      }
      /* ボタン設定状態の色 */
      .btn-need {
        border-color: var(--orange) !important;
        color: var(--orange) !important;
      }
      .btn-done {
        border-color: var(--green) !important;
        color: var(--green) !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ヘッダー -->
      <div id="hdr">
        <button id="btn-file">📂 開く</button>
        <span id="filename">ファイル未選択</span>
        <span id="hdr-title">動画解析アプリ</span>
        <button id="btn-mode-toggle" class="mode-manual">✋ 手動</button>
        <button id="btn-settings">⚙ 設定</button>
      </div>

      <!-- ステップバー -->
      <div id="step-bar">
        <div class="step" id="s1"><span class="sn">①</span><span class="sl"> 動画を開く</span></div>
        <span class="step-arr">›</span>
        <div class="step" id="s2"><span class="sn">②</span><span class="sl"> 原点設定</span></div>
        <span class="step-arr">›</span>
        <div class="step" id="s3"><span class="sn">③</span><span class="sl"> スケール設定</span></div>
        <span class="step-arr">›</span>
        <div class="step" id="s4"><span class="sn">④</span><span class="sl"> 範囲指定</span></div>
        <span class="step-arr">›</span>
        <div class="step" id="s5"><span class="sn">⑤</span><span class="sl"> 点を登録</span></div>
        <span class="step-arr">›</span>
        <div class="step" id="s6"><span class="sn">⑥</span><span class="sl"> 解析・出力</span></div>
      </div>

      <!-- 動画エリア -->
      <div id="video-wrap">
        <canvas id="main-canvas" tabindex="0"></canvas>
        <div id="mag-wrap"><canvas id="mag-canvas" width="130" height="130"></canvas></div>
        <div id="mode-badge"></div>
        <!-- 2点間速度 大表示（左上・ドラッグ可） -->
        <div id="vel-overlay">
          <div class="vo-title">📐 2点間平均速度 ⠿</div>
          <div class="vo-body">
            <div class="vo-row">
              <span class="vo-lbl">Vx</span>
              <span class="vo-val" id="vo-vx" style="color: #4a9eff">---</span>
              <span class="vo-unit">m/s</span>
            </div>
            <div class="vo-row">
              <span class="vo-lbl">Vy</span>
              <span class="vo-val" id="vo-vy" style="color: #ff453a">---</span>
              <span class="vo-unit">m/s</span>
            </div>
            <div class="vo-spd" id="vo-spd">--- <span class="vo-unit">m/s</span></div>
            <div class="vo-dt" id="vo-dt"></div>
          </div>
          <button id="vel-close">✕ 閉じる</button>
        </div>
      </div>

      <!-- 情報バー -->
      <div id="info-bar">
        <span id="info-frame">Frame: 0 / 0</span>
        <span id="info-coord">実座標: ---</span>
        <span id="info-bri">輝度: ---</span>
        <label style="display: flex; align-items: center; gap: 3px; flex-shrink: 0">
          <span style="font-size: 0.75rem; color: var(--tx2)">FPS:</span>
          <input type="number" id="fps-input" value="60" min="1" max="1000" step="1" style="width: 52px; background: var(--b1); border: 1px solid var(--b2); color: var(--accent); border-radius: 4px; padding: 2px 5px; font-size: 0.8rem; font-family: var(--font); text-align: center" title="フレームレートを手動入力（自動検出時は自動更新）" />
        </label>
      </div>

      <!-- コントロール -->
      <div id="ctrl">
        <!-- ① スライダー + 1フレーム送りボタン -->
        <div class="ctrl-row">
          <button id="btn-p1" title="1フレーム戻す [←]">◀1f</button>
          <input type="range" id="frame-slider" min="0" max="0" value="0" />
          <button id="btn-n1" title="1フレーム進む [→]">1f▶</button>
        </div>
        <!-- ② 点登録・区間速度ボタン -->
        <div class="ctrl-row">
          <button id="btn-regpt" class="accent" title="カーソル位置を現在フレームに点として登録 [C]">✚ 点登録 [C]</button>
          <button id="btn-fpt" title="2点間速度の開始点を登録 [F]">F 開始点</button>
          <button id="btn-rpt" title="2点間速度の終了点を登録 [R]">R 終了点</button>
          <button id="btn-resume" class="accent" disabled title="この位置から自動追跡を再開 [A]">⟳ 再開 [A]</button>
        </div>
        <!-- ③ 解析ボタン -->
        <div class="ctrl-row">
          <button id="btn-sf" title="現在フレームを解析開始点に設定 [S]">S 開始F設定</button>
          <button id="btn-ef" title="現在フレームを解析終了点に設定 [E]">E 終了F設定</button>
          <button id="btn-run" class="green" disabled>▶ 解析開始</button>
          <button id="btn-stop">■ 停止</button>
        </div>
        <!-- ④ 原点・スケール設定 -->
        <div class="ctrl-row">
          <button id="btn-origin" title="映像上の原点をクリックで設定">① 原点設定</button>
          <button id="btn-scale" title="基準長さの両端2点をクリックで設定">② スケール2点</button>
          <span class="info-lbl">基準長:</span>
          <input type="number" id="real-length" value="2.00" step="0.01" min="0.01" />
          <span class="info-lbl">m</span>
        </div>
        <!-- ⑤ 情報表示 -->
        <div class="ctrl-row">
          <span class="info-lbl" id="lbl-origin">原点: 未設定</span>
          <span class="info-lbl" id="lbl-scale">スケール: 未設定</span>
          <span class="info-lbl" id="lbl-cal">係数: ---</span>
        </div>
      </div>
    </div>

    <!-- 設定モーダル -->
    <div class="modal-overlay" id="settings-overlay">
      <div class="modal-sheet">
        <div class="modal-title">⚙ 設定</div>
        <div class="setting-row">
          <span class="setting-lbl">検出しきい値:</span>
          <input type="range" id="thr-slider" min="0" max="255" value="180" />
          <span id="thr-val" style="font-size: 0.7rem; min-width: 28px">180</span>
        </div>
        <div class="setting-row">
          <span class="setting-lbl">特徴点の色:</span>
          <select id="color-mode">
            <option value="bright">白い点（明るい）目安180〜220</option>
            <option value="dark">黒い点（暗い）目安30〜80</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-lbl">X 軸反転:</span>
          <input type="checkbox" id="x-flip" />
        </div>
        <div class="setting-row">
          <span class="setting-lbl">モード:</span>
          <select id="mode-sel">
            <option value="auto">自動追跡</option>
            <option value="manual">手動デジタイズ</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-lbl">解析サーチ半径:</span>
          <input type="range" id="search-radius" min="10" max="80" value="30" style="flex: 1" />
          <span id="sr-val" style="font-size: 0.7rem; min-width: 28px">30</span>
          <span style="font-size: 0.7rem; color: var(--tx2)">px</span>
        </div>
        <div class="modal-btns" style="margin-top: 10px">
          <button id="btn-avg-vel">📐 2点間速度</button>
          <button id="btn-show-graph" class="accent">📈 グラフ表示</button>
          <button id="btn-csv" class="green">💾 CSV 出力</button>
          <button id="btn-clear-pts" class="red">🗑 点をクリア</button>
        </div>
        <div style="margin-top: 10px; text-align: center">
          <button id="btn-settings-close" style="min-width: 120px">閉じる</button>
        </div>
      </div>
    </div>

    <!-- グラフモーダル -->
    <div id="graph-overlay">
      <div id="graph-sheet">
        <div id="graph-tabs">
          <button id="tab-vel" class="accent">速度 Vx・Vy</button>
          <button id="tab-acc">加速度 Ax・Ay</button>
          <button id="btn-graph-close">✕</button>
        </div>
        <canvas id="graph-canvas" height="280"></canvas>
        <div style="font-size: 0.65rem; color: var(--tx2); text-align: center">速度: Vx <span style="color: #4a9eff">■</span> Vy <span style="color: #ff453a">■</span> &nbsp;|&nbsp; 加速度: Ax <span style="color: #30d158">■</span> Ay <span style="color: #bf5af2">■</span></div>
      </div>
    </div>

    <!-- 非表示要素 -->
    <video id="vid" style="display: none" preload="metadata" playsinline webkit-playsinline></video>
    <canvas id="offscreen" style="display: none"></canvas>
    <input type="file" id="file-input" accept="video/*" style="display: none" />

    <script>
      "use strict";

      // ══════════════════════════════════════════════════
      // 状態管理
      // ══════════════════════════════════════════════════
      const S = {
        fps: 60,
        totalFrames: 0,
        currentFrame: 0,
        startFrame: 0,
        endFrame: 0,
        origin: null, // {x, y} ビデオ座標
        scalePoints: [], // [{x,y},{x,y}]
        realLength: 2.0, // 基準長さ [m]
        calIndex: 1.0, // [m/px]
        xSign: 1, // 1 or -1
        xFlip: false,
        threshold: 180,
        colorMode: "bright", // 'bright'|'dark'
        mode: "auto", // 'auto'|'manual'
        searchRadius: 30,
        points: {}, // {frame: {x,y}} 全追跡点
        manualPoints: {}, // {frame: {x,y}} 手動登録のみ
        twoPoints: {}, // {start:{f,pt}, end:{f,pt}} 2点間速度用
        selectedPt: null, // 現在選択中の点
        cursorPos: { x: 0, y: 0 }, // ビデオ座標
        isTracking: false,
        stopFlag: false,
        settingMode: null, // 'origin'|'scale'|null
        magVisible: true,
        videoLoaded: false,
        results: null, // {rm, velF, accF, tVel, tAcc}
        graphMode: "vel", // 'vel'|'acc'
        awaitingManual: false, // 手動補正待ち
      };

      // ══════════════════════════════════════════════════
      // DOM 参照
      // ══════════════════════════════════════════════════
      const vid = document.getElementById("vid");
      const mainCv = document.getElementById("main-canvas");
      const magCv = document.getElementById("mag-canvas");
      const offCv = document.getElementById("offscreen");
      const slider = document.getElementById("frame-slider");
      const magCtx = magCv.getContext("2d");
      const offCtx = offCv.getContext("2d");
      const G = (id) => document.getElementById(id);

      // ══════════════════════════════════════════════════
      // ユーティリティ
      // ══════════════════════════════════════════════════
      function fmtMs(s) {
        if (!isFinite(s)) return "0:00.000";
        const m = Math.floor(s / 60);
        return m + ":" + (s - m * 60).toFixed(3).padStart(6, "0");
      }
      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }
      function showToast(msg, dur = 2000) {
        let el = document.getElementById("_toast");
        if (!el) {
          el = document.createElement("div");
          el.id = "_toast";
          Object.assign(el.style, { position: "fixed", bottom: "70px", left: "50%", transform: "translateX(-50%)", background: "rgba(30,30,30,.95)", color: "#fff", padding: "5px 16px", borderRadius: "14px", fontSize: ".72rem", pointerEvents: "none", opacity: "0", transition: "opacity .3s", zIndex: "9999", whiteSpace: "nowrap", border: "1px solid #3a3a3c" });
          document.body.appendChild(el);
        }
        el.textContent = msg;
        el.style.opacity = "1";
        clearTimeout(el._t);
        el._t = setTimeout(() => {
          el.style.opacity = "0";
        }, dur);
      }

      // ══════════════════════════════════════════════════
      // 座標変換
      // ══════════════════════════════════════════════════
      function getTransform() {
        const cw = mainCv.clientWidth,
          ch = mainCv.clientHeight;
        const vw = vid.videoWidth || 1,
          vh = vid.videoHeight || 1;
        const sc = Math.min(cw / vw, ch / vh);
        const ox = (cw - vw * sc) / 2,
          oy = (ch - vh * sc) / 2;
        return { sc, ox, oy, vw, vh, cw, ch };
      }
      function v2c(vx, vy) {
        const { sc, ox, oy } = getTransform();
        return { x: vx * sc + ox, y: vy * sc + oy };
      }
      function c2v(cx, cy) {
        const { sc, ox, oy, vw, vh } = getTransform();
        return {
          x: clamp((cx - ox) / sc, 0, vw - 1),
          y: clamp((cy - oy) / sc, 0, vh - 1),
        };
      }
      function toReal(vx, vy) {
        if (!S.origin) return null;
        return {
          x: (vx - S.origin.x) * S.calIndex * S.xSign,
          y: (vy - S.origin.y) * S.calIndex * -1,
        };
      }
      function updateCalIndex() {
        if (S.scalePoints.length === 2) {
          const dx = S.scalePoints[1].x - S.scalePoints[0].x;
          const dy = S.scalePoints[1].y - S.scalePoints[0].y;
          const pl = Math.sqrt(dx * dx + dy * dy);
          S.calIndex = pl > 0 ? S.realLength / pl : 1;
          G("lbl-cal").textContent = "係数: " + S.calIndex.toFixed(6) + " m/px";
        }
      }

      // ══════════════════════════════════════════════════
      // キャンバスサイズ同期
      // ══════════════════════════════════════════════════
      function syncCanvasSize() {
        mainCv.width = mainCv.clientWidth;
        mainCv.height = mainCv.clientHeight;
      }
      new ResizeObserver(syncCanvasSize).observe(G("video-wrap"));

      // ══════════════════════════════════════════════════
      // フレーム描画
      // ══════════════════════════════════════════════════
      function drawFrame() {
        if (!S.videoLoaded) return;
        syncCanvasSize();
        const ctx = mainCv.getContext("2d");
        const { sc, ox, oy, vw, vh } = getTransform();

        // 背景
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, mainCv.width, mainCv.height);

        // ビデオフレーム
        ctx.drawImage(vid, ox, oy, vw * sc, vh * sc);

        // オフスクリーンに描画（追跡処理用）
        offCv.width = vw;
        offCv.height = vh;
        offCtx.drawImage(vid, 0, 0, vw, vh);

        // ── 追跡軌跡 ──────────────────────────────
        const frames = Object.keys(S.points)
          .map(Number)
          .sort((a, b) => a - b);
        if (frames.length > 1) {
          ctx.strokeStyle = "#00ddff";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          frames.forEach((f, i) => {
            const { x, y } = v2c(S.points[f].x, S.points[f].y);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          });
          ctx.stroke();
        }

        // ROI 表示
        if (S.roi) {
          const { x1, y1, x2, y2 } = S.roi;
          const p1 = v2c(x1, y1),
            p2 = v2c(x2, y2);
          ctx.strokeStyle = "#ff453a";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
        }

        // 現在フレームの点
        if (S.points[S.currentFrame]) {
          const { x, y } = v2c(S.points[S.currentFrame].x, S.points[S.currentFrame].y);
          ctx.fillStyle = "#ff453a";
          ctx.beginPath();
          ctx.arc(x, y, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        // カーソル（映像エリア全幅・全高の十字線）
        const cp = v2c(S.cursorPos.x, S.cursorPos.y);
        const vidLeft = ox,
          vidRight = ox + vw * sc;
        const vidTop = oy,
          vidBottom = oy + vh * sc;

        ctx.save();
        // 外側の影（視認性向上）
        ctx.strokeStyle = "rgba(0,0,0,.45)";
        ctx.lineWidth = 2.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(vidLeft, cp.y);
        ctx.lineTo(vidRight, cp.y);
        ctx.moveTo(cp.x, vidTop);
        ctx.lineTo(cp.x, vidBottom);
        ctx.stroke();
        // メイン十字線（白・破線）
        ctx.strokeStyle = "rgba(255,255,255,.75)";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(vidLeft, cp.y);
        ctx.lineTo(vidRight, cp.y);
        ctx.moveTo(cp.x, vidTop);
        ctx.lineTo(cp.x, vidBottom);
        ctx.stroke();
        ctx.setLineDash([]);
        // 中心小円（実線）
        ctx.strokeStyle = "rgba(255,255,0,.9)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        // 速度オーバーレイ（結果がある場合）
        if (S.results) {
          const { velF } = S.results;
          const startF = frames[0];
          const i = S.currentFrame - startF;
          if (1 <= i && i <= velF.length) {
            const v = velF[i - 1];
            ctx.fillStyle = "rgba(0,0,0,.55)";
            ctx.fillRect(6, 6, 180, 45);
            ctx.fillStyle = "#4a9eff";
            ctx.font = "12px Courier New";
            ctx.fillText(`Vx: ${v.x.toFixed(3)} m/s`, 12, 22);
            ctx.fillStyle = "#ff453a";
            ctx.fillText(`Vy: ${v.y.toFixed(3)} m/s`, 12, 38);
          }
        }

        // ── 原点マーカー（黄色・常時表示）──────────
        if (S.origin) {
          const op = v2c(S.origin.x, S.origin.y);
          ctx.save();
          // 影
          ctx.strokeStyle = "rgba(0,0,0,.55)";
          ctx.lineWidth = 3.5;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(op.x - 15, op.y);
          ctx.lineTo(op.x + 15, op.y);
          ctx.moveTo(op.x, op.y - 15);
          ctx.lineTo(op.x, op.y + 15);
          ctx.stroke();
          // 本体
          ctx.strokeStyle = "#ffcc00";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(op.x - 15, op.y);
          ctx.lineTo(op.x + 15, op.y);
          ctx.moveTo(op.x, op.y - 15);
          ctx.lineTo(op.x, op.y + 15);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(op.x, op.y, 6, 0, Math.PI * 2);
          ctx.stroke();
          // ラベル背景
          ctx.fillStyle = "rgba(0,0,0,.65)";
          ctx.fillRect(op.x + 10, op.y - 20, 18, 15);
          ctx.fillStyle = "#ffcc00";
          ctx.font = "bold 11px Courier New";
          ctx.fillText("O", op.x + 14, op.y - 9);
          ctx.restore();
        }

        // ── スケールマーカー（シアン・常時表示）────
        if (S.scalePoints.length > 0) {
          ctx.save();
          S.scalePoints.forEach((sp, i) => {
            const cp = v2c(sp.x, sp.y);
            // 影
            ctx.strokeStyle = "rgba(0,0,0,.55)";
            ctx.lineWidth = 3;
            ctx.setLineDash([]);
            ctx.strokeRect(cp.x - 7, cp.y - 7, 14, 14);
            // 本体
            ctx.strokeStyle = "#00ddff";
            ctx.lineWidth = 2;
            ctx.strokeRect(cp.x - 6, cp.y - 6, 12, 12);
            // ラベル
            ctx.fillStyle = "rgba(0,0,0,.65)";
            ctx.fillRect(cp.x + 9, cp.y - 20, 22, 15);
            ctx.fillStyle = "#00ddff";
            ctx.font = "bold 11px Courier New";
            ctx.fillText("S" + (i + 1), cp.x + 11, cp.y - 9);
          });
          if (S.scalePoints.length === 2) {
            const p1 = v2c(S.scalePoints[0].x, S.scalePoints[0].y);
            const p2 = v2c(S.scalePoints[1].x, S.scalePoints[1].y);
            // 接続破線
            ctx.strokeStyle = "rgba(0,221,255,.5)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.setLineDash([]);
            // 中点に基準長さラベル
            const mx = (p1.x + p2.x) / 2,
              my = (p1.y + p2.y) / 2;
            const lbl = S.realLength.toFixed(2) + " m";
            ctx.font = "bold 12px Courier New";
            const lw = ctx.measureText(lbl).width;
            ctx.fillStyle = "rgba(0,0,0,.72)";
            ctx.fillRect(mx - lw / 2 - 5, my - 18, lw + 10, 16);
            ctx.fillStyle = "#00ddff";
            ctx.textAlign = "center";
            ctx.fillText(lbl, mx, my - 6);
            ctx.textAlign = "left";
          }
          ctx.restore();
        }

        // 拡大鏡
        if (S.magVisible) drawMagnifier();
      }

      function drawMagnifier() {
        const z = 12,
          ms = 130;
        const { x, y } = S.cursorPos;
        const vw = vid.videoWidth,
          vh = vid.videoHeight;
        const sx = clamp(x - z, 0, vw - 1),
          sy = clamp(y - z, 0, vh - 1);
        const sw = Math.min(z * 2, vw - sx),
          sh = Math.min(z * 2, vh - sy);
        if (sw <= 0 || sh <= 0) return;
        magCtx.imageSmoothingEnabled = false;
        magCtx.drawImage(offCv, sx, sy, sw, sh, 0, 0, ms, ms);
        // 十字線
        magCtx.strokeStyle = "#ff4444";
        magCtx.lineWidth = 1;
        magCtx.beginPath();
        magCtx.moveTo(ms / 2, 0);
        magCtx.lineTo(ms / 2, ms);
        magCtx.moveTo(0, ms / 2);
        magCtx.lineTo(ms, ms / 2);
        magCtx.stroke();
        // 輝度
        const imgd = offCtx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
        const bri = Math.round((imgd[0] + imgd[1] + imgd[2]) / 3);
        G("info-bri").textContent = "輝度: " + bri;
      }

      // ══════════════════════════════════════════════════
      // フレームシーク
      // ══════════════════════════════════════════════════
      function seekToFrame(frame) {
        return new Promise((resolve) => {
          const target = (frame + 0.5) / S.fps; // 修正: フレーム境界ちょうどでなく中央を指定
          if (Math.abs(vid.currentTime - target) < 1 / (S.fps * 4)) {
            drawFrame();
            resolve();
            return;
          }
          vid.onseeked = () => {
            vid.onseeked = null;
            drawFrame();
            resolve();
          };
          vid.currentTime = target;
        });
      }
      function gotoFrame(f) {
        S.currentFrame = clamp(Math.round(f), 0, S.totalFrames - 1);
        slider.value = S.currentFrame;
        G("info-frame").textContent = `Frame: ${S.currentFrame} / ${S.totalFrames}`;
        seekToFrame(S.currentFrame);
      }

      // ══════════════════════════════════════════════════
      // Butterworth ローパスフィルタ（Python scipy 互換）
      // ══════════════════════════════════════════════════
      function btwFilter(x, sampleRate, cutoffHz) {
        if (x.length < 12) return [...x];
        const nyq = sampleRate / 2;
        const wn = Math.min(cutoffHz / (0.802 * nyq), 0.999);
        const C = 1 / Math.tan((Math.PI * wn) / 2);
        const C2 = C * C,
          sq2C = Math.SQRT2 * C;
        const D = 1 + sq2C + C2;
        const b0 = 1 / D,
          b1 = 2 / D,
          b2 = 1 / D;
        const a1 = (2 * (1 - C2)) / D,
          a2 = (1 - sq2C + C2) / D;
        function pass(arr) {
          const out = new Array(arr.length).fill(0);
          for (let i = 0; i < arr.length; i++) {
            out[i] = b0 * arr[i];
            if (i >= 1) out[i] += b1 * arr[i - 1] - a1 * out[i - 1];
            if (i >= 2) out[i] += b2 * arr[i - 2] - a2 * out[i - 2];
          }
          return out;
        }
        const fwd = pass(x);
        const bwd = pass([...fwd].reverse());
        return bwd.reverse();
      }

      // ══════════════════════════════════════════════════
      // 速度・加速度計算
      // ══════════════════════════════════════════════════
      function calcPhysics() {
        const frames = Object.keys(S.points)
          .map(Number)
          .sort((a, b) => a - b);
        if (frames.length < 5) return null;
        const pts = frames.map((f) => S.points[f]);
        const n = pts.length;

        // 実座標変換
        const rm = pts.map((p) => {
          if (!S.origin) return { x: 0, y: 0 };
          return {
            x: (p.x - S.origin.x) * S.calIndex * S.xSign,
            y: (p.y - S.origin.y) * S.calIndex * -1,
          };
        });

        // 速度: 中心差分
        // vel[j] = (rm[j+2]-rm[j])/(2/fps) → フレーム j+1 に対応
        const vel = [];
        for (let i = 0; i < n - 2; i++) {
          vel.push({
            x: (rm[i + 2].x - rm[i].x) / (2 / S.fps),
            y: (rm[i + 2].y - rm[i].y) / (2 / S.fps),
          });
        }
        const velXf = btwFilter(
          vel.map((v) => v.x),
          S.fps,
          6.0,
        );
        const velYf = btwFilter(
          vel.map((v) => v.y),
          S.fps,
          6.0,
        );
        const velF = velXf.map((x, i) => ({ x, y: velYf[i] }));

        // 加速度: 中心差分
        // acc[j] = (velF[j+2]-velF[j])/(2/fps) → フレーム j+2 に対応
        const acc = [];
        for (let i = 0; i < velF.length - 2; i++) {
          acc.push({
            x: (velF[i + 2].x - velF[i].x) / (2 / S.fps),
            y: (velF[i + 2].y - velF[i].y) / (2 / S.fps),
          });
        }
        const accXf = btwFilter(
          acc.map((a) => a.x),
          S.fps,
          6.0,
        );
        const accYf = btwFilter(
          acc.map((a) => a.y),
          S.fps,
          6.0,
        );
        const accF = accXf.map((x, i) => ({ x, y: accYf[i] }));

        // 時間軸（正確な対応）
        const tVel = velF.map((_, i) => (i + 1) / S.fps);
        const tAcc = accF.map((_, i) => (i + 2) / S.fps);

        return { frames, pts, rm, velF, accF, tVel, tAcc };
      }

      // フレーム間変位の許容上限 [m]（想定最大速度 × フレーム時間）
      // 修正: 固定値0.15mはFPS依存の意味を持つため, 速度基準に変更
      const MAX_SPEED = 8.0; // 想定最大速度 [m/s]．競技に応じて調整可
      function maxJump() {
        return MAX_SPEED / S.fps;
      }
      // ══════════════════════════════════════════════════
      // 自動追跡（ブロブ検出）
      // ══════════════════════════════════════════════════
      function findBlob(predX, predY) {
        const r = S.searchRadius;
        const vw = vid.videoWidth,
          vh = vid.videoHeight;
        const x0 = Math.max(0, Math.round(predX - r));
        const y0 = Math.max(0, Math.round(predY - r));
        const w = Math.min(r * 2, vw - x0);
        const h = Math.min(r * 2, vh - y0);
        if (w <= 0 || h <= 0) return null;

        const imgd = offCtx.getImageData(x0, y0, w, h).data;
        const dark = S.colorMode === "dark";
        const thr = S.threshold;

        let sumX = 0,
          sumY = 0,
          cnt = 0;
        for (let py = 0; py < h; py++) {
          for (let px = 0; px < w; px++) {
            const i = (py * w + px) * 4;
            const bri = (imgd[i] + imgd[i + 1] + imgd[i + 2]) / 3;
            const pass = dark ? bri < thr : bri > thr;
            if (pass) {
              sumX += x0 + px;
              sumY += y0 + py;
              cnt++;
            }
          }
        }
        if (cnt < 5) return null;
        return { x: sumX / cnt, y: sumY / cnt };
      }

      // ══════════════════════════════════════════════════
      // 解析ループ
      // ══════════════════════════════════════════════════
      async function runAnalysis() {
        if (!S.videoLoaded) {
          showToast("動画を選択してください");
          return;
        }
        const mode = G("mode-sel").value;
        const sf = S.startFrame,
          ef = S.endFrame;

        if (mode === "manual") {
          const frames = Object.keys(S.manualPoints)
            .map(Number)
            .sort((a, b) => a - b);
          if (frames.length < 5) {
            showToast("手動モード: 5フレーム以上に点を登録してください");
            return;
          }
          // 修正: 前値保持ではなく, 前後の手動点間を線形補間
          const f0 = Math.max(sf, frames[0]);
          const f1 = Math.min(ef, frames[frames.length - 1]);
          for (let f = f0; f <= f1; f++) {
            if (S.manualPoints[f]) {
              S.points[f] = { ...S.manualPoints[f] };
              continue;
            }
            const prev = frames.filter((ff) => ff < f).slice(-1)[0];
            const next = frames.find((ff) => ff > f);
            if (prev === undefined || next === undefined) continue;
            const t = (f - prev) / (next - prev);
            const p0 = S.manualPoints[prev],
              p1 = S.manualPoints[next];
            S.points[f] = { x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t };
          }
          finishAnalysis();
          return;
        }

        // 自動追跡
        if (S.scalePoints.length !== 2) {
          showToast("自動追跡には③スケール設定が必要です（未設定だと誤判定します）");
          return;
        }
        if (!S.selectedPt) {
          showToast("特徴点をクリックしてください");
          return;
        }
        S.isTracking = true;
        S.stopFlag = false;
        G("btn-run").disabled = true;
        G("btn-stop").classList.add("red");

        S.points[sf] = { ...S.selectedPt };
        let prevPt = { ...S.selectedPt };

        for (let f = sf + 1; f <= ef; f++) {
          if (S.stopFlag) {
            showToast("解析を中止しました");
            break;
          }

          await seekToFrame(f);
          const blob = findBlob(prevPt.x, prevPt.y);

          if (blob) {
            // 変位チェック
            const dx = (blob.x - prevPt.x) * S.calIndex * S.xSign;
            const dy = (blob.y - prevPt.y) * S.calIndex * -1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > maxJump()) {
              // 手動補正要求
              if (S.manualPoints[f]) {
                S.points[f] = S.manualPoints[f];
              } else {
                S.points[f] = { ...prevPt };
                showToast(`フレーム${f}: 異常検出 → Cキーで手動補正して Aキーで再開`);
                S.awaitingManual = true;
                gotoFrame(f);
                S.isTracking = false;
                G("btn-run").disabled = false;
                G("btn-resume").disabled = false;
                G("btn-stop").classList.remove("red");
                return;
              }
            } else {
              S.points[f] = blob;
            }
          } else {
            S.points[f] = { ...prevPt };
          }
          prevPt = S.points[f];

          G("info-frame").textContent = `追跡中... Frame: ${f} / ${S.totalFrames}`;
        }

        S.isTracking = false;
        G("btn-run").disabled = false;
        G("btn-stop").classList.remove("red");
        finishAnalysis();
      }

      function finishAnalysis() {
        const r = calcPhysics();
        if (!r) {
          showToast("計算エラー: データが不足しています");
          return;
        }
        S.results = r;
        drawFrame();
        updateStepUI();
        showToast(`解析完了: ${Object.keys(S.points).length} フレーム`);
        G("btn-resume").disabled = false;
      }

      // ══════════════════════════════════════════════════
      // CSV 出力
      // ══════════════════════════════════════════════════
      function exportCSV() {
        const r = S.results || calcPhysics();
        if (!r) {
          showToast("先に解析を実行してください");
          return;
        }
        const { frames, pts, rm, velF, accF } = r;

        // 修正: 再現性のためのメタ情報ヘッダ
        let csv = "";
        csv += `# File,${S.videoName || ""}\n`;
        csv += `# FPS,${S.fps}\n`;
        csv += `# CalIndex [m/px],${S.calIndex.toFixed(8)}\n`;
        csv += `# Origin [px],${S.origin ? S.origin.x.toFixed(2) + "," + S.origin.y.toFixed(2) : "未設定"}\n`;
        csv += `# ScaleP1 [px],${S.scalePoints[0] ? S.scalePoints[0].x.toFixed(2) + "," + S.scalePoints[0].y.toFixed(2) : ""}\n`;
        csv += `# ScaleP2 [px],${S.scalePoints[1] ? S.scalePoints[1].x.toFixed(2) + "," + S.scalePoints[1].y.toFixed(2) : ""}\n`;
        csv += `# RealLength [m],${S.realLength}\n`;
        csv += `# XFlip,${S.xFlip}\n`;
        csv += `# Filter,Butterworth 2nd zero-lag cutoff 6Hz\n`;
        csv += "Frame,Time [s],X [px],Y [px],X [m],Y [m],Vx [m/s],Vy [m/s],Ax [m/s^2],Ay [m/s^2]\n";

        const t0 = frames[0];
        frames.forEach((f, i) => {
          const p = pts[i],
            rv = rm[i];
          const vx = 1 <= i && i <= velF.length ? velF[i - 1].x.toFixed(6) : "";
          const vy = 1 <= i && i <= velF.length ? velF[i - 1].y.toFixed(6) : "";
          const ax = 2 <= i && i <= accF.length + 1 ? accF[i - 2].x.toFixed(6) : "";
          const ay = 2 <= i && i <= accF.length + 1 ? accF[i - 2].y.toFixed(6) : "";
          csv += `${f},${((f - t0) / S.fps).toFixed(6)},${p.x.toFixed(3)},${p.y.toFixed(3)},${rv.x.toFixed(6)},${rv.y.toFixed(6)},${vx},${vy},${ax},${ay}\n`;
        });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }));
        a.download = (S.videoName || "tracking") + "_tracking.csv";
        a.click();
        showToast("CSV を出力しました");
      }

      // ══════════════════════════════════════════════════
      // グラフ描画
      // ══════════════════════════════════════════════════
      function drawGraph() {
        const r = S.results || calcPhysics();
        if (!r) {
          showToast("先に解析を実行してください");
          return;
        }

        const gCv = G("graph-canvas");
        gCv.width = gCv.clientWidth;
        const ctx = gCv.getContext("2d");
        const W = gCv.width,
          H = gCv.height;
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, W, H);

        const mode = S.graphMode;
        const data = mode === "vel" ? r.velF : r.accF;
        const tData = mode === "vel" ? r.tVel : r.tAcc;
        const colors = mode === "vel" ? ["#4a9eff", "#ff453a"] : ["#30d158", "#bf5af2"];
        const title = mode === "vel" ? "Velocity [m/s]" : "Acceleration [m/s²]";

        if (!data || data.length === 0) return;

        const allV = data.flatMap((d) => [d.x, d.y]);
        const vmin = Math.min(...allV),
          vmax = Math.max(...allV);
        const mg = (vmax - vmin) * 0.1 || 1;
        const ylo = vmin - mg,
          yhi = vmax + mg;

        const pad = { l: 55, r: 15, t: 30, b: 35 };
        const gw = W - pad.l - pad.r,
          gh = H - pad.t - pad.b;
        const xMax = tData[tData.length - 1] || 1;

        const tX = (t) => pad.l + (t / xMax) * gw;
        const tY = (v) => pad.t + gh - ((v - ylo) / (yhi - ylo)) * gh;

        // グリッドと軸
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        const yStep = Math.pow(10, Math.floor(Math.log10(yhi - ylo)) - 1);
        for (let v = Math.ceil(ylo / yStep) * yStep; v <= yhi; v += yStep) {
          const py = Math.round(tY(v));
          ctx.beginPath();
          ctx.moveTo(pad.l, py);
          ctx.lineTo(W - pad.r, py);
          ctx.stroke();
          ctx.fillStyle = "#666";
          ctx.font = "10px Courier New";
          ctx.fillText(v.toFixed(yStep < 0.1 ? 2 : 1), 2, py + 4);
        }
        const tStep = xMax > 10 ? 1 : xMax > 5 ? 0.5 : 0.2;
        for (let t = 0; t <= xMax + tStep / 2; t += tStep) {
          const px = Math.round(tX(t));
          ctx.strokeStyle = "#333";
          ctx.beginPath();
          ctx.moveTo(px, pad.t);
          ctx.lineTo(px, pad.t + gh);
          ctx.stroke();
          ctx.fillStyle = "#666";
          ctx.font = "10px Courier New";
          ctx.fillText(t.toFixed(1), px - 10, H - 5);
        }

        // 軸ライン
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 1;
        ctx.strokeRect(pad.l, pad.t, gw, gh);

        // データ線
        ["x", "y"].forEach((key, ki) => {
          ctx.strokeStyle = colors[ki];
          ctx.lineWidth = 2;
          ctx.beginPath();
          data.forEach((d, i) => {
            const px = tX(tData[i]),
              py = tY(d[key]);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          });
          ctx.stroke();
        });

        // 現在フレームライン
        const startF = r.frames[0];
        const curRelTime = (S.currentFrame - startF) / S.fps;
        if (curRelTime >= 0 && curRelTime <= xMax) {
          const px = tX(curRelTime);
          ctx.strokeStyle = "rgba(255,255,255,.7)";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(px, pad.t);
          ctx.lineTo(px, pad.t + gh);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // タイトル
        ctx.fillStyle = "#ccc";
        ctx.font = "bold 13px Courier New";
        ctx.fillText(title, pad.l + gw / 2 - 50, 18);
      }

      // ══════════════════════════════════════════════════
      // 動画ファイル読み込み
      // ══════════════════════════════════════════════════
      G("file-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = "";

        // データクリア確認
        if (Object.keys(S.points).length > 0) {
          if (!confirm("追跡データをクリアして新しい動画を読み込みますか？")) return;
        }
        clearAllData();

        S.videoName = file.name.replace(/\.[^.]+$/, "");
        G("filename").textContent = file.name;

        vid.onloadedmetadata = null;
        vid.onerror = null;
        vid.src = "";

        vid.onerror = () => {
          vid.onerror = null;
          vid.onloadedmetadata = null;
          const code = vid.error?.code || 0;
          alert(["", "中断", "ネットワークエラー", "デコードエラー（コーデック非対応）", "動画形式が非対応です。MP4(H.264)をお試しください"][code] || "読み込みエラー");
        };
        vid.onloadedmetadata = () => {
          vid.onloadedmetadata = null;
          // FPS入力欄の現在値を使用（手動設定済みの場合はそちらを優先）
          const inputFps = parseFloat(G("fps-input").value);
          S.fps = inputFps >= 1 ? inputFps : 60;
          G("fps-input").value = S.fps;
          S.totalFrames = Math.round(vid.duration * S.fps);
          S.endFrame = S.totalFrames - 1;
          slider.max = S.totalFrames - 1;
          slider.value = 0;
          S.videoLoaded = true;
          G("btn-run").disabled = false;
          G("info-frame").textContent = `Frame: 0 / ${S.totalFrames}`;
          // FPS の簡易検出（requestVideoFrameCallback対応ブラウザのみ）
          if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
            let lastMT = -1,
              _fpsSet = false;
            function detectFPS(now, meta) {
              if (!_fpsSet && lastMT > 0) {
                const d = meta.mediaTime - lastMT;
                if (d > 0.005 && d < 0.1) {
                  const snap = [24, 25, 30, 48, 50, 60, 90, 120, 240].reduce((a, b) => (Math.abs(b - 1 / d) < Math.abs(a - 1 / d) ? b : a));
                  S.fps = snap;
                  _fpsSet = true;
                  G("fps-input").value = snap; // ★ 入力欄にも反映
                  S.totalFrames = Math.round(vid.duration * S.fps);
                  slider.max = S.totalFrames - 1;
                  G("info-frame").textContent = `Frame: ${S.currentFrame} / ${S.totalFrames}`;
                  showToast(`FPS 自動検出: ${snap}fps`);
                }
              }
              lastMT = meta.mediaTime;
              if (!_fpsSet) vid.requestVideoFrameCallback(detectFPS);
            }
            vid.requestVideoFrameCallback(detectFPS);
          }
          gotoFrame(0);
          showToast("動画を読み込みました");
          updateStepUI();
        };
        vid.src = URL.createObjectURL(file);
        vid.load();
      });

      // ══════════════════════════════════════════════════
      // データクリア
      // ══════════════════════════════════════════════════
      function clearAllData() {
        S.points = {};
        S.manualPoints = {};
        S.twoPoints = {};
        S.selectedPt = null;
        S.results = null;
        S.startFrame = 0;
        S.endFrame = S.totalFrames - 1 || 0;
        S.isTracking = false;
        S.stopFlag = false;
        S.awaitingManual = false;
        G("btn-resume").disabled = true;
      }

      // ══════════════════════════════════════════════════
      // カーソル・クリック処理
      // ══════════════════════════════════════════════════
      function onCanvasPointer(e, isClick) {
        const rect = mainCv.getBoundingClientRect();
        const ex = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const ey = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        const vp = c2v(ex, ey);
        S.cursorPos = { x: vp.x, y: vp.y };

        // 実座標表示
        if (S.origin) {
          const r = toReal(vp.x, vp.y);
          G("info-coord").textContent = `実座標: (${r.x.toFixed(3)}, ${r.y.toFixed(3)}) m`;
        }

        if (!isClick) {
          drawFrame();
          return;
        }

        // 設定モードの処理
        if (S.settingMode === "origin") {
          S.origin = { ...vp };
          G("lbl-origin").textContent = `原点: (${Math.round(vp.x)}, ${Math.round(vp.y)})`;
          updateCalIndex();
          S.settingMode = null;
          G("mode-badge").style.display = "none";
          showToast("原点を設定しました");
          drawFrame();
          updateStepUI();
          return;
        }
        if (S.settingMode === "scale") {
          S.scalePoints.push({ ...vp });
          if (S.scalePoints.length === 1) {
            showToast("2点目をクリックしてください");
          } else {
            updateCalIndex();
            G("lbl-scale").textContent = `スケール: ${S.scalePoints.length}点`;
            S.settingMode = null;
            G("mode-badge").style.display = "none";
            showToast(`スケール設定完了 係数: ${S.calIndex.toFixed(6)} m/px`);
          }
          drawFrame();
          updateStepUI();
          return;
        }

        // 点の登録
        S.selectedPt = { ...vp };
        S.points[S.currentFrame] = { ...vp };
        S.manualPoints[S.currentFrame] = { ...vp };
        G("btn-resume").disabled = false;

        if (S.awaitingManual) {
          S.awaitingManual = false;
          showToast("補正登録完了");
        }

        drawFrame();
        updateStepUI();
      }

      mainCv.addEventListener("mousemove", (e) => onCanvasPointer(e, false));
      mainCv.addEventListener("click", (e) => onCanvasPointer(e, true));
      mainCv.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          onCanvasPointer(e, false);
        },
        { passive: false },
      );
      mainCv.addEventListener(
        "touchend",
        (e) => {
          e.preventDefault();
          onCanvasPointer(e, true);
        },
        { passive: false },
      );

      // ══════════════════════════════════════════════════
      // スライダー
      // ══════════════════════════════════════════════════
      slider.addEventListener("input", () => gotoFrame(+slider.value));

      // ══════════════════════════════════════════════════
      // キーボード操作
      // ══════════════════════════════════════════════════
      document.addEventListener("keydown", (e) => {
        if (!S.videoLoaded) return;
        const shift = e.shiftKey;
        const key = e.key;

        if (shift) {
          // Shift+矢印: カーソル 1px 移動
          let dx = 0,
            dy = 0;
          if (key === "ArrowLeft") dx = -1;
          else if (key === "ArrowRight") dx = 1;
          else if (key === "ArrowUp") dy = -1;
          else if (key === "ArrowDown") dy = 1;
          if (dx || dy) {
            e.preventDefault();
            S.cursorPos.x = clamp(S.cursorPos.x + dx, 0, vid.videoWidth - 1);
            S.cursorPos.y = clamp(S.cursorPos.y + dy, 0, vid.videoHeight - 1);
            drawFrame();
          }
          return;
        }

        switch (key) {
          case "ArrowRight":
            e.preventDefault();
            gotoFrame(S.currentFrame + 1);
            break;
          case "ArrowLeft":
            e.preventDefault();
            gotoFrame(S.currentFrame - 1);
            break;
          case "s":
          case "S":
            S.startFrame = S.currentFrame;
            showToast(`開始フレーム: ${S.startFrame}`);
            break;
          case "e":
          case "E":
            S.endFrame = S.currentFrame;
            showToast(`終了フレーム: ${S.endFrame}`);
            break;
          case "z":
          case "Z":
            S.magVisible = !S.magVisible;
            G("mag-wrap").style.display = S.magVisible ? "block" : "none";
            drawFrame();
            break;
          case "a":
          case "A":
            resumeTracking();
            break;
          case "c":
          case "C":
            // C キー: カーソル位置を現在フレームに登録
            S.points[S.currentFrame] = { ...S.cursorPos };
            S.manualPoints[S.currentFrame] = { ...S.cursorPos };
            G("btn-resume").disabled = false;
            showToast(`フレーム${S.currentFrame}: 点を登録しました`);
            drawFrame();
            updateStepUI();
            break;
          case "f":
          case "F":
            S.twoPoints.start = { f: S.currentFrame, pt: { ...S.cursorPos } };
            showToast(`開始点: frame ${S.currentFrame}`);
            break;
          case "r":
          case "R":
            S.twoPoints.end = { f: S.currentFrame, pt: { ...S.cursorPos } };
            showToast(`終了点: frame ${S.currentFrame}`);
            break;
        }
      });

      // ══════════════════════════════════════════════════
      // 自動再開
      // ══════════════════════════════════════════════════
      async function resumeTracking() {
        const confirmed = S.points[S.currentFrame] || S.manualPoints[S.currentFrame];
        if (!confirmed) {
          showToast("現在フレームに点がありません。Cキーで登録してください");
          return;
        }
        S.selectedPt = { ...confirmed };
        const ef = S.endFrame;
        if (S.currentFrame >= ef) {
          showToast("現在フレームが終了フレーム以上です");
          return;
        }

        S.stopFlag = false;
        S.isTracking = true;
        G("btn-run").disabled = true;
        G("btn-stop").classList.add("red");

        let prevPt = { ...confirmed };

        for (let f = S.currentFrame + 1; f <= ef; f++) {
          if (S.stopFlag) {
            showToast("解析を中止しました");
            break;
          }
          await seekToFrame(f);
          const blob = findBlob(prevPt.x, prevPt.y);
          if (blob) {
            const dx = (blob.x - prevPt.x) * S.calIndex * S.xSign;
            const dy = (blob.y - prevPt.y) * S.calIndex * -1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > maxJump()) {
              if (S.manualPoints[f]) {
                S.points[f] = S.manualPoints[f];
              } else {
                // 修正: 再開時も初回解析と同様に停止して補正を促す（従来は黙って前値保持）
                S.points[f] = { ...prevPt };
                showToast(`フレーム${f}: 異常検出 → Cキーで手動補正して Aキーで再開`);
                S.awaitingManual = true;
                gotoFrame(f);
                S.isTracking = false;
                G("btn-run").disabled = false;
                G("btn-resume").disabled = false;
                G("btn-stop").classList.remove("red");
                return;
              }
            } else {
              S.points[f] = blob;
            }
          } else {
            S.points[f] = { ...prevPt };
          }
          prevPt = S.points[f];
          G("info-frame").textContent = `追跡中... Frame: ${f}`;
        }

        S.isTracking = false;
        G("btn-run").disabled = false;
        G("btn-stop").classList.remove("red");
        finishAnalysis();
      }

      // ══════════════════════════════════════════════════
      // 2点間平均速度
      // ══════════════════════════════════════════════════
      function calcAvgVel() {
        const { start, end } = S.twoPoints;
        if (!start || !end) {
          showToast("F・R キーで2点を登録してください");
          return;
        }
        if (start.f === end.f) {
          showToast("異なるフレームを選択してください");
          return;
        }
        if (!S.origin) {
          showToast("原点を設定してください");
          return;
        }
        const r1 = toReal(start.pt.x, start.pt.y);
        const r2 = toReal(end.pt.x, end.pt.y);
        const dt = Math.abs(end.f - start.f) / S.fps;
        const vx = (r2.x - r1.x) / dt,
          vy = (r2.y - r1.y) / dt;
        const spd = Math.sqrt(vx * vx + vy * vy);

        // ── 大表示オーバーレイに表示 ──
        G("vo-vx").textContent = (vx >= 0 ? "+" : "") + vx.toFixed(3);
        G("vo-vy").textContent = (vy >= 0 ? "+" : "") + vy.toFixed(3);
        G("vo-spd").innerHTML = spd.toFixed(3) + ' <span class="vo-unit">m/s</span>';
        G("vo-dt").textContent = `Δt: ${dt.toFixed(3)} s  (F${start.f}→F${end.f})`;
        G("vel-overlay").style.display = "block";
      }

      // ══════════════════════════════════════════════════
      // ステップ表示・ボタン状態更新
      // ══════════════════════════════════════════════════
      function updateStepUI() {
        const states = [S.videoLoaded, !!S.origin, S.scalePoints.length === 2, S.endFrame > S.startFrame, Object.keys(S.points).length > 0, !!S.results];
        // ステップバーの色
        for (let i = 0; i < 6; i++) {
          const el = G("s" + (i + 1));
          el.classList.remove("done", "current");
          if (states[i]) {
            el.classList.add("done");
          } else if (i === 0 || states[i - 1]) {
            el.classList.add("current"); // 次にやるべきステップ
          }
        }
        // 原点・スケールボタンの色
        const ob = G("btn-origin"),
          sb = G("btn-scale");
        ob.classList.toggle("btn-done", !!S.origin);
        ob.classList.toggle("btn-need", !S.origin);
        sb.classList.toggle("btn-done", S.scalePoints.length === 2);
        sb.classList.toggle("btn-need", S.scalePoints.length < 2 && !!S.origin);
        // 解析ボタンのハイライト
        const canRun = S.videoLoaded && (Object.keys(S.points).length > 0 || Object.keys(S.manualPoints).length > 0);
        G("btn-run").style.boxShadow = canRun && !S.isTracking ? "0 0 8px 2px rgba(48,209,88,.55)" : "";
      }

      // ══════════════════════════════════════════════════
      // ステップバー タップ → 直接操作
      // ══════════════════════════════════════════════════
      const stepActions = [
        // ① 動画を開く
        () => G("file-input").click(),

        // ② 原点設定
        () => {
          if (!S.videoLoaded) {
            showToast("先に動画を開いてください");
            return;
          }
          S.settingMode = "origin";
          G("mode-badge").textContent = "② 原点をクリックしてください";
          G("mode-badge").style.display = "block";
          showToast("② 映像上の原点（基準点）をクリック");
        },

        // ③ スケール設定
        () => {
          if (!S.origin) {
            showToast("先に原点を設定してください");
            return;
          }
          S.settingMode = "scale";
          S.scalePoints = [];
          G("mode-badge").textContent = "③ スケール1点目をクリック";
          G("mode-badge").style.display = "block";
          showToast("③ 基準長さの1点目をクリック → 2点目をクリック");
        },

        // ④ 範囲指定（現在フレームを開始Fに設定）
        () => {
          if (!S.videoLoaded) {
            showToast("先に動画を開いてください");
            return;
          }
          S.startFrame = S.currentFrame;
          showToast(`④ 開始フレームを ${S.startFrame} に設定。次に終了フレームまで移動して「E 終了F設定」を押してください`);
          updateStepUI();
        },

        // ⑤ 点を登録（現在カーソル位置を登録）
        () => {
          if (!S.videoLoaded) {
            showToast("先に動画を開いてください");
            return;
          }
          S.points[S.currentFrame] = { ...S.cursorPos };
          S.manualPoints[S.currentFrame] = { ...S.cursorPos };
          G("btn-resume").disabled = false;
          showToast(`⑤ フレーム${S.currentFrame} に点を登録しました`);
          drawFrame();
          updateStepUI();
        },

        // ⑥ 解析開始
        () => {
          const n = Object.keys(S.points).length + Object.keys(S.manualPoints).length;
          if (n === 0) {
            showToast("先に点を登録してください（⑤）");
            return;
          }
          runAnalysis();
        },
      ];

      for (let i = 0; i < 6; i++) {
        const el = G("s" + (i + 1));
        el.style.cursor = "pointer";
        el.addEventListener("click", () => stepActions[i]());
        el.addEventListener("touchend", (e) => {
          e.preventDefault();
          stepActions[i]();
        });
      }

      // ══════════════════════════════════════════════════
      // ボタンバインディング
      // ══════════════════════════════════════════════════
      G("btn-file").addEventListener("click", () => G("file-input").click());
      G("btn-settings").addEventListener("click", () => G("settings-overlay").classList.add("open"));
      G("btn-settings-close").addEventListener("click", () => G("settings-overlay").classList.remove("open"));
      G("settings-overlay").addEventListener("click", (e) => {
        if (e.target === G("settings-overlay")) G("settings-overlay").classList.remove("open");
      });

      G("btn-run").addEventListener("click", runAnalysis);
      G("btn-stop").addEventListener("click", () => {
        S.stopFlag = true;
        S.isTracking = false;
        G("btn-run").disabled = false;
        G("btn-stop").classList.remove("red");
      });
      G("btn-resume").addEventListener("click", resumeTracking);
      G("btn-sf").addEventListener("click", () => {
        S.startFrame = S.currentFrame;
        showToast(`開始F: ${S.startFrame}`);
        updateStepUI();
      });
      G("btn-ef").addEventListener("click", () => {
        S.endFrame = S.currentFrame;
        showToast(`終了F: ${S.endFrame}`);
        updateStepUI();
      });

      // ── ★ 新ボタン: 1フレーム送り ──
      G("btn-p1").addEventListener("click", () => gotoFrame(S.currentFrame - 1));
      G("btn-n1").addEventListener("click", () => gotoFrame(S.currentFrame + 1));

      // ── ★ 新ボタン: 点登録（Cキー相当）──
      G("btn-regpt").addEventListener("click", () => {
        if (!S.videoLoaded) {
          showToast("動画を開いてください");
          return;
        }
        S.points[S.currentFrame] = { ...S.cursorPos };
        S.manualPoints[S.currentFrame] = { ...S.cursorPos };
        S.selectedPt = { ...S.cursorPos };
        G("btn-resume").disabled = false;
        showToast(`フレーム${S.currentFrame}: 点を登録しました`);
        drawFrame();
        updateStepUI();
      });

      // ── ★ 新ボタン: 2点間速度 開始点（Fキー相当）──
      G("btn-fpt").addEventListener("click", () => {
        S.twoPoints.start = { f: S.currentFrame, pt: { ...S.cursorPos } };
        G("btn-fpt").classList.add("btn-done");
        showToast(`開始点: F${S.currentFrame} (${Math.round(S.cursorPos.x)}, ${Math.round(S.cursorPos.y)})`);
      });

      // ── ★ 新ボタン: 2点間速度 終了点（Rキー相当）──
      G("btn-rpt").addEventListener("click", () => {
        S.twoPoints.end = { f: S.currentFrame, pt: { ...S.cursorPos } };
        G("btn-rpt").classList.add("btn-done");
        showToast(`終了点: F${S.currentFrame} (${Math.round(S.cursorPos.x)}, ${Math.round(S.cursorPos.y)})`);
      });

      G("btn-origin").addEventListener("click", () => {
        S.settingMode = "origin";
        S.scalePoints = [];
        G("mode-badge").textContent = "原点をクリック";
        G("mode-badge").style.display = "block";
      });
      G("btn-scale").addEventListener("click", () => {
        S.settingMode = "scale";
        S.scalePoints = [];
        G("mode-badge").textContent = "スケール1点目をクリック";
        G("mode-badge").style.display = "block";
      });
      G("real-length").addEventListener("input", function () {
        S.realLength = parseFloat(this.value) || 2;
        updateCalIndex();
      });

      // FPS 手動入力
      G("fps-input").addEventListener("change", function () {
        const v = parseFloat(this.value);
        if (!v || v < 1) {
          this.value = S.fps;
          return;
        }
        if (v === S.fps) return;
        // 修正: フレーム番号と時刻の対応が崩れるため, 既存データは確認のうえクリア
        const hasData = Object.keys(S.points).length > 0 || Object.keys(S.manualPoints).length > 0;
        if (hasData && !confirm(`FPSを変更すると登録済みの点と解析結果はクリアされます（${S.fps}→${v}fps）．続行しますか？`)) {
          this.value = S.fps;
          return;
        }
        if (hasData) clearAllData();
        S.results = null;
        S.fps = v;
        if (S.videoLoaded) {
          S.totalFrames = Math.round(vid.duration * S.fps);
          S.endFrame = S.totalFrames - 1;
          slider.max = S.totalFrames - 1;
          gotoFrame(Math.min(S.currentFrame, S.totalFrames - 1));
          showToast(`FPS を ${v} に設定しました（総フレーム: ${S.totalFrames}）`);
        }
        drawFrame();
        updateStepUI();
      });

      // 設定
      G("thr-slider").addEventListener("input", function () {
        S.threshold = +this.value;
        G("thr-val").textContent = this.value;
      });
      G("color-mode").addEventListener("change", function () {
        S.colorMode = this.value;
      });
      G("x-flip").addEventListener("change", function () {
        S.xFlip = this.checked;
        S.xSign = this.checked ? -1 : 1;
      });
      G("mode-sel").addEventListener("change", function () {
        S.mode = this.value;
        updateModeBtn();
      });

      // モード切り替えボタン（ヘッダー）
      function updateModeBtn() {
        const btn = G("btn-mode-toggle");
        if (S.mode === "auto") {
          btn.textContent = "🤖 自動";
          btn.className = "mode-auto";
        } else {
          btn.textContent = "✋ 手動";
          btn.className = "mode-manual";
        }
        G("mode-sel").value = S.mode;
      }
      G("btn-mode-toggle").addEventListener("click", () => {
        S.mode = S.mode === "auto" ? "manual" : "auto";
        updateModeBtn();
        showToast(S.mode === "auto" ? "🤖 自動追跡モード" : "✋ 手動デジタイズモード");
      });
      // 初期状態を手動に設定（学生向け）
      S.mode = "manual";
      G("mode-sel").value = "manual";
      updateModeBtn();
      G("search-radius").addEventListener("input", function () {
        S.searchRadius = +this.value;
        G("sr-val").textContent = this.value;
      });

      G("btn-avg-vel").addEventListener("click", calcAvgVel);
      G("vel-close").addEventListener("click", () => {
        G("vel-overlay").style.display = "none";
      });

      // ── 速度オーバーレイ ドラッグ処理 ────────────────
      (function () {
        const el = G("vel-overlay");
        const wrap = G("video-wrap");
        let dragging = false,
          startX = 0,
          startY = 0,
          origLeft = 0,
          origTop = 0;

        function startDrag(cx, cy) {
          dragging = true;
          startX = cx;
          startY = cy;
          origLeft = parseInt(el.style.left) || 8;
          origTop = parseInt(el.style.top) || 8;
          el.style.transition = "none";
        }
        function moveDrag(cx, cy) {
          if (!dragging) return;
          const r = wrap.getBoundingClientRect();
          const newL = origLeft + (cx - startX);
          const newT = origTop + (cy - startY);
          // コンテナ内に収める
          const maxL = r.width - el.offsetWidth - 4;
          const maxT = r.height - el.offsetHeight - 4;
          el.style.left = Math.max(4, Math.min(maxL, newL)) + "px";
          el.style.top = Math.max(4, Math.min(maxT, newT)) + "px";
        }
        function endDrag() {
          dragging = false;
        }

        // マウス
        el.addEventListener("mousedown", (e) => {
          if (e.target.id === "vel-close") return;
          e.preventDefault();
          startDrag(e.clientX, e.clientY);
        });
        document.addEventListener("mousemove", (e) => {
          if (dragging) moveDrag(e.clientX, e.clientY);
        });
        document.addEventListener("mouseup", endDrag);

        // タッチ
        el.addEventListener(
          "touchstart",
          (e) => {
            if (e.target.id === "vel-close") return;
            e.preventDefault();
            const t = e.touches[0];
            startDrag(t.clientX, t.clientY);
          },
          { passive: false },
        );
        document.addEventListener(
          "touchmove",
          (e) => {
            if (!dragging) return;
            e.preventDefault();
            const t = e.touches[0];
            moveDrag(t.clientX, t.clientY);
          },
          { passive: false },
        );
        document.addEventListener("touchend", endDrag);
      })();
      G("btn-csv").addEventListener("click", exportCSV);
      G("btn-clear-pts").addEventListener("click", () => {
        if (confirm("追跡点をすべてクリアしますか？")) {
          clearAllData();
          drawFrame();
          showToast("クリアしました");
          updateStepUI();
        }
      });

      // グラフ
      G("btn-show-graph").addEventListener("click", () => {
        const r = S.results || calcPhysics();
        if (!r) {
          showToast("先に解析を実行してください");
          return;
        }
        S.results = r;
        G("graph-overlay").classList.add("open");
        requestAnimationFrame(drawGraph);
      });
      G("btn-graph-close").addEventListener("click", () => G("graph-overlay").classList.remove("open"));
      G("graph-overlay").addEventListener("click", (e) => {
        if (e.target === G("graph-overlay")) G("graph-overlay").classList.remove("open");
      });
      G("tab-vel").addEventListener("click", () => {
        S.graphMode = "vel";
        G("tab-vel").classList.add("accent");
        G("tab-acc").classList.remove("accent");
        drawGraph();
      });
      G("tab-acc").addEventListener("click", () => {
        S.graphMode = "acc";
        G("tab-acc").classList.add("accent");
        G("tab-vel").classList.remove("accent");
        drawGraph();
      });

      // グラフ上でスライダー同期
      G("graph-canvas").addEventListener("click", (e) => {
        const r = S.results;
        if (!r) return;
        const rect = G("graph-canvas").getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const pad_l = 55,
          gw = G("graph-canvas").width - 55 - 15;
        const t = ((cx - pad_l) / gw) * (r.tVel[r.tVel.length - 1] || 1);
        const target = r.frames[0] + Math.round(t * S.fps);
        gotoFrame(target);
        requestAnimationFrame(drawGraph);
      });

      // ══════════════════════════════════════════════════
      // 初期化
      // ══════════════════════════════════════════════════
      syncCanvasSize();
    </script>
  </body>
</html>
